name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  JAVA_VERSION: "21"
  ZIG_VERSION: "0.16.0"
  ANDROID_API: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  ANDROID_NDK: "30.0.14904198"

jobs:
  zig-core:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - run: mkdir -p ~/.android/cache core/.zig-cache

      - uses: actions/cache@v5
        with:
          path: |
            ~/.android/cache
            core/.zig-cache
          key: zig-core-${{ runner.os }}-${{ env.ZIG_VERSION }}-${{ env.ANDROID_NDK }}-${{ hashFiles('core/**/*.zig') }}
          restore-keys: |
            zig-core-${{ runner.os }}-${{ env.ZIG_VERSION }}-${{ env.ANDROID_NDK }}-

      - uses: android-actions/setup-android@v4

      - run: set +o pipefail; yes | sdkmanager --licenses
        env:
          JAVA_OPTS: -Djava.awt.headless=true
        shell: bash

      - run: sdkmanager "platform-tools" "platforms;android-${ANDROID_API}" "build-tools;${ANDROID_BUILD_TOOLS}" "ndk;${ANDROID_NDK}"
        env:
          JAVA_OPTS: -Djava.awt.headless=true
        shell: bash

      - run: zig build --prefix "$RUNNER_TEMP/zig-jniLibs" -Dandroid-ndk="$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK}" -Dandroid-api=26
        working-directory: core

  android-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - run: mkdir -p ~/.android/cache core/.zig-cache

      - uses: actions/cache@v5
        with:
          path: |
            ~/.android/cache
            core/.zig-cache
          key: android-build-${{ runner.os }}-${{ env.ZIG_VERSION }}-${{ env.ANDROID_NDK }}-${{ hashFiles('core/**/*.zig', 'android/**/*.kts', 'android/gradle/*.toml') }}
          restore-keys: |
            android-build-${{ runner.os }}-${{ env.ZIG_VERSION }}-${{ env.ANDROID_NDK }}-

      - uses: android-actions/setup-android@v4

      - run: set +o pipefail; yes | sdkmanager --licenses
        env:
          JAVA_OPTS: -Djava.awt.headless=true
        shell: bash

      - run: sdkmanager "platform-tools" "platforms;android-${ANDROID_API}" "build-tools;${ANDROID_BUILD_TOOLS}" "ndk;${ANDROID_NDK}"
        env:
          JAVA_OPTS: -Djava.awt.headless=true
        shell: bash

      - run: ./gradlew build --info
        working-directory: android
